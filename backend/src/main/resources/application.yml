server:
  port: 8080

spring:
  application:
    name: fx-rate-hub
  
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 1000ms
          max-attempts: 3
          max-interval: 10000ms
          multiplier: 2.0

app:
  rabbitmq:
    rate-input-queue: rate.input.queue

# Hazelcast Configuration (Placeholders for future implementation)
# hazelcast:
#   cluster-name: fx-rate-cluster
#   network:
#     join:
#       multicast:
#         enabled: false
#       tcp-ip:
#         enabled: true
#         members: 127.0.0.1

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.fxrate.platform: DEBUG
