version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: fx-rate-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5

  hazelcast:
    image: hazelcast/hazelcast:5.4
    container_name: fx-rate-hazelcast
    ports:
      - "5701:5701"
    environment:
      - HZ_CLUSTERNAME=fx-rate-cluster
